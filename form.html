<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StartupRelly - قدم مشروعك</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', system-ui, sans-serif; }
        .form-card { transition: all 0.3s; }
        .form-card:hover { box-shadow: 0 20px 25px -5px rgb(16 185 129 / 0.2); }
    </style>
</head>
<body class="bg-gray-50 py-12">

<div class="max-w-4xl mx-auto px-4 sm:px-6">
    <div class="bg-white rounded-3xl shadow-xl form-card overflow-hidden">

        <!-- Header -->
        <div class="bg-emerald-600 text-white px-6 sm:px-8 py-6">
            <h1 class="text-2xl sm:text-3xl font-bold">قدم مشروعك على StartupRelly</h1>
            <p class="text-emerald-100 mt-2 text-sm sm:text-base">املأ البيانات بعناية عشان نعرض مشروعك بشكل احترافي</p>
        </div>

        <form id="projectForm" class="p-6 sm:p-8 space-y-10">

            <!-- ===== البيانات الشخصية ===== -->
            <div>
                <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-3">
                    <i class="fa-solid fa-user"></i> البيانات الشخصية
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">الاسم الكامل <span class="text-red-500">*</span></label>
                        <input
                            type="text"
                            name="full_name"
                            required
                            placeholder="مثال: أحمد محمد علي"
                            class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-600">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">رقم التليفون <span class="text-red-500">*</span></label>
                        <input
                            type="tel"
                            name="phone"
                            required
                            placeholder="01XXXXXXXXX"
                            class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-600">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium mb-2">الإيميل <span class="text-red-500">*</span></label>
                        <input
                            type="email"
                            name="email"
                            required
                            placeholder="example@email.com"
                            class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-600">
                    </div>
                </div>
            </div>

            <!-- ===== بيانات المشروع ===== -->
            <div>
                <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-3">
                    <i class="fa-solid fa-lightbulb"></i> بيانات المشروع
                </h2>
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">اسم المشروع <span class="text-red-500">*</span></label>
                        <input
                            type="text"
                            name="project_name"
                            required
                            placeholder="مثال: تطبيق توصيل خضار من المزارعين"
                            class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-600">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">وصف المشروع <span class="text-red-500">*</span></label>
                        <p class="text-xs text-gray-500 mb-2">اشرح المشكلة اللي بيحلها مشروعك + الحل + المميزات</p>
                        <textarea
                            name="project_description"
                            required
                            rows="5"
                            placeholder="مثال: بيربط المزارعين بالزبائن مباشرة بدون وسيط ويوفر 30% من التكلفة..."
                            class="w-full border border-gray-300 rounded-3xl px-5 py-4 focus:outline-none focus:border-emerald-600"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">الدراسة المالية والتوقعات <span class="text-red-500">*</span></label>
                        <p class="text-xs text-gray-500 mb-2">الأرباح المتوقعة + التكاليف + توقعات النمو</p>
                        <textarea
                            name="financial_study"
                            required
                            rows="4"
                            placeholder="مثال: التكلفة الشهرية 5000 جنيه، الإيراد المتوقع بعد 6 شهور 15,000 جنيه..."
                            class="w-full border border-gray-300 rounded-3xl px-5 py-4 focus:outline-none focus:border-emerald-600"></textarea>
                    </div>
                </div>
            </div>

            <!-- ===== المالية والشراكة ===== -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium mb-2">المبلغ المطلوب (جنيه) <span class="text-red-500">*</span></label>
                    <input
                        type="number"
                        name="funding_amount"
                        required
                        min="1000"
                        placeholder="مثال: 50000"
                        class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-600">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">النسبة المطروحة (%) <span class="text-red-500">*</span></label>
                    <input
                        type="number"
                        name="equity_percentage"
                        required
                        step="0.1"
                        min="1"
                        max="100"
                        placeholder="مثال: 20"
                        class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-600">
                </div>
            </div>

            <!-- ===== نوع الشراكة ===== -->
            <div>
                <label class="block text-sm font-medium mb-3">نوع الشراكة المطلوبة <span class="text-red-500">*</span></label>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <label class="flex items-center gap-3 border rounded-2xl p-4 cursor-pointer hover:border-emerald-500 transition">
                        <input type="radio" name="partnership_type" value="تمويل فقط" required class="w-5 h-5 accent-emerald-600">
                        <span class="text-sm">تمويل فقط</span>
                    </label>
                    <label class="flex items-center gap-3 border rounded-2xl p-4 cursor-pointer hover:border-emerald-500 transition">
                        <input type="radio" name="partnership_type" value="شريك عامل" class="w-5 h-5 accent-emerald-600">
                        <span class="text-sm">شريك عامل</span>
                    </label>
                    <label class="flex items-center gap-3 border rounded-2xl p-4 cursor-pointer hover:border-emerald-500 transition">
                        <input type="radio" name="partnership_type" value="استشاري" class="w-5 h-5 accent-emerald-600">
                        <span class="text-sm">استشاري</span>
                    </label>
                    <label class="flex items-center gap-3 border rounded-2xl p-4 cursor-pointer hover:border-emerald-500 transition">
                        <input type="radio" name="partnership_type" value="مزيج" class="w-5 h-5 accent-emerald-600">
                        <span class="text-sm">مزيج</span>
                    </label>
                </div>
            </div>

            <!-- ===== حالة المشروع ===== -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium mb-2">حالة المشروع <span class="text-red-500">*</span></label>
                    <select
                        name="project_status"
                        required
                        class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-600">
                        <option value="">اختر الحالة</option>
                        <option value="فكرة فقط">لسه فكرة فقط</option>
                        <option value="بدأ فعلاً">بدأ فعلاً</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">مدة العمل حتى الآن</label>
                    <input
                        type="text"
                        name="project_duration"
                        placeholder="مثال: شهرين، سنة، ..."
                        class="w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-600">
                </div>
            </div>

            <!-- ===== السجل التجاري والمقر ===== -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium mb-3">هل لديك سجل تجاري؟ <span class="text-red-500">*</span></label>
                    <div class="flex gap-6">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="has_commercial_register" value="نعم" required class="accent-emerald-600 w-4 h-4">
                            <span>نعم</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="has_commercial_register" value="لا" class="accent-emerald-600 w-4 h-4">
                            <span>لا</span>
                        </label>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-3">هل لديك مقر إداري؟ <span class="text-red-500">*</span></label>
                    <div class="flex gap-6">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="has_office" value="نعم" required class="accent-emerald-600 w-4 h-4">
                            <span>نعم</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="has_office" value="لا" class="accent-emerald-600 w-4 h-4">
                            <span>لا</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- ===== إقرار المخاطر ===== -->
            <div class="bg-amber-50 border border-amber-200 rounded-3xl p-6">
                <label class="flex items-start gap-3 cursor-pointer">
                    <input type="checkbox" name="risk_acknowledgement" required class="mt-1 accent-emerald-600 w-5 h-5">
                    <span class="text-sm text-gray-700">
                        أقر بأنني فاهم تمامًا أن الاستثمار في المشاريع ينطوي على مخاطر مالية وقد أخسر كل أو جزء من رأس المال،
                        وأنا المسؤول الرئيسي عن نجاح أو فشل مشروعي.
                    </span>
                </label>
            </div>

            <!-- ===== رسالة الخطأ ===== -->
            <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-2xl px-5 py-4 text-sm"></div>

            <!-- ===== زر الإرسال ===== -->
            <button
                type="submit"
                id="submitBtn"
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-5 sm:py-6 rounded-3xl text-lg sm:text-xl font-bold shadow-lg transition flex items-center justify-center gap-3">
                <span id="submitText">إرسال الطلب ودفع الباقة</span>
                <span id="submitSpinner" class="hidden">
                    <i class="fa-solid fa-spinner fa-spin"></i> جاري الإرسال...
                </span>
            </button>

        </form>
    </div>
</div>

<script>
    document.getElementById('projectForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const btn = document.getElementById('submitBtn');
        const submitText = document.getElementById('submitText');
        const submitSpinner = document.getElementById('submitSpinner');
        const errorMsg = document.getElementById('errorMsg');

        // إخفاء الخطأ القديم
        errorMsg.classList.add('hidden');

        // تجميع البيانات من الفورم
        const formData = {
            full_name: this.full_name.value.trim(),
            phone: this.phone.value.trim(),
            email: this.email.value.trim(),
            project_name: this.project_name.value.trim(),
            project_description: this.project_description.value.trim(),
            financial_study: this.financial_study.value.trim(),
            funding_amount: Number(this.funding_amount.value),
            equity_percentage: Number(this.equity_percentage.value),
            partnership_type: this.partnership_type.value,
            project_status: this.project_status.value,
            project_duration: this.project_duration.value.trim(),
            has_commercial_register: this.has_commercial_register.value,
            has_office: this.has_office.value,
            risk_acknowledgement: this.risk_acknowledgement.checked,
            submitted_at: new Date().toISOString()
        };

        // Loading state
        btn.disabled = true;
        submitText.classList.add('hidden');
        submitSpinner.classList.remove('hidden');

        try {
            // ======================================================
            // ربط الـ Backend هنا — بدّل الـ URL بالـ endpoint الفعلي
            // ======================================================
            const response = await fetch('https://your-backend-api.com/api/projects', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    // 'Authorization': 'Bearer YOUR_TOKEN'  // لو محتاج auth
                },
                body: JSON.stringify(formData)
            });

            if (!response.ok) {
                // لو الـ backend رجّع error
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.message || `خطأ من السيرفر: ${response.status}`);
            }

            const result = await response.json();

            // نجاح
            alert('✅ تم استلام طلبك بنجاح!\n\nسنقوم بمراجعة مشروعك وإنتاج الفيديو الاحترافي خلال 48 ساعة.\nشكراً لثقتك في StartupRelly 💚');
            this.reset();

        } catch (err) {
            // عرض الخطأ للمستخدم
            errorMsg.textContent = 'حدث خطأ أثناء الإرسال: ' + err.message;
            errorMsg.classList.remove('hidden');
        } finally {
            // إرجاع الزرار لحالته
            btn.disabled = false;
            submitText.classList.remove('hidden');
            submitSpinner.classList.add('hidden');
        }
    });
</script>

</body>
</html>
